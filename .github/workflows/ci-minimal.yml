name: ci-minimal

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-minimal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # アプリ本体は web/ にある（リポジトリ直下は運用スクリプト用ツールボックス）。
    # 全ステップを web/ で実行し、実際のアプリをビルド・監査する。
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Security audit (prod deps only)
        run: npm audit --omit=dev --audit-level=moderate
