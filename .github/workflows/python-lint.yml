name: Python Lint

on:
  push:
    branches: [main, master]
    paths:
      - '**.py'
      - '.github/workflows/python-lint.yml'
  pull_request:
    branches: [main, master]
    paths:
      - '**.py'
      - '.github/workflows/python-lint.yml'

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check . --select=E9,F --exclude=node_modules --exclude=.venv --exclude=venv

      - name: Run ruff format check
        run: ruff format --check . --exclude=node_modules --exclude=.venv --exclude=venv
